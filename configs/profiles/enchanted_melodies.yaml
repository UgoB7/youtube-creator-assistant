profile:
  id: enchanted_melodies
  display_name: Enchanted Melodies
  visual_input_mode: image

paths:
  runtime_root: ../../runtime/enchanted_melodies
  outputs_dir: ../../runtime/enchanted_melodies/outputs
  incoming_dir: ../../runtime/enchanted_melodies/incoming
  images_dir: ../../runtime/enchanted_melodies/images
  logs_dir: ../../runtime/enchanted_melodies/logs
  psalms_dir: ../../assets/audio/enchanted_melodies/faded
  gospel_dir: ../../assets/audio/enchanted_melodies/faded

workflow:
  fps: 30
  target_duration_tc: "3:33:32:20"
  trim_first_audio_seconds: 0.0
  include_gospel: false
  max_head_items: 0
  max_reference_summaries: 0
  preferred_reference_count: 0
  allow_repeats: true
  use_title_reference_guidance: false
  selection_seed_mode: random
  max_selected_titles: 1
  audio_extensions:
    - .wav
    - .mp3

thumbnail:
  max_bytes: 2097152
  target_bytes: 1800000
  suffix: "_yt"
  candidate_generation_enabled: true
  idea_count: 4
  candidate_model: google/nano-banana-pro
  candidate_resolution: 2K
  candidate_aspect_ratio: "16:9"
  candidate_output_format: jpg
  candidate_safety_filter_level: block_only_high
  candidate_allow_fallback_model: false
  idea_prompt:
    $include_text: ../local/profiles/enchanted_melodies/thumbnail_idea_prompt.txt

openai:
  model: gpt-5.2-2025-12-11
  title_examples_input:
    $include_text: ../local/profiles/enchanted_melodies/title_examples_input.txt
  devotional_examples_input:
    $include_text: ../local/profiles/enchanted_melodies/devotional_examples_input.txt
  title_generation:
    count: 10
    min_count: 10
    use_visual_input: true
    require_separator: true
    separator: " — "
    prompt_addendum:
      $include_text: ../local/profiles/enchanted_melodies/title_prompt_addendum.txt
    rules:
      - keep them relevant to the current image
      - no emojis, no hashtags, no all caps
      - use exactly one " — " separator per title
      - keep the left side broad and reusable, and the right side image-specific
      - avoid repeating the same right-side wording across the 10 titles
  theme_generation:
    count: 5
    min_count: 5
    use_visual_input: true
    include_audio_context: false
    prompt_addendum:
      $include_text: ../local/profiles/enchanted_melodies/theme_prompt_addendum.txt
    rules:
      - 2 to 5 words each
      - aligned with the chosen title
      - aligned with the image
      - fantasy-oriented, calm, immersive, and evocative
      - no references to audio tracks or chapters

description:
  variant: enchanted_melodies_template
  audio_explanation_count: 5
  dynamic_intro_include_audio_context: false
  dynamic_intro_prompt:
    $include_text: ../local/profiles/enchanted_melodies/dynamic_intro_prompt.txt

replicate:
  enabled: false

web:
  host: 127.0.0.1
  port: 5000
  debug: true

render:
  enabled: true
  backend: resolve
  timeline_prefix: enchanted
  timeline_mode: existing_only
  append_mode: sequential_exact
  clean_media_pool_imports: true
  media_pool_folder_name: YCA Imports
  import_only_required_media: true
  video_mode: image
  audio_strategy: cut_to_duration
  video_strategy: loop_to_duration
  video_timing_source: metadata_first
  image_strategy: resolve_still_duration
  do_render: false
  render_dir: ../../runtime/enchanted_melodies/renders
  width: 1920
  height: 1080
