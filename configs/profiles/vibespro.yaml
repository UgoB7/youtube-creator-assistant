profile:
  id: vibespro
  display_name: VibesPro
  visual_input_mode: image

paths:
  runtime_root: ../../runtime/vibespro
  outputs_dir: ../../runtime/vibespro/outputs
  incoming_dir: ../../runtime/vibespro/incoming
  images_dir: ../../runtime/vibespro/images
  logs_dir: ../../runtime/vibespro/logs
  psalms_dir: ../../assets/audio/psalms
  gospel_dir: ../../assets/audio/gospel

workflow:
  fps: 30
  target_duration_tc: "3:33:32:20"
  trim_first_audio_seconds: 3.2
  include_gospel: true
  max_head_items: 3
  max_reference_summaries: 5

thumbnail:
  max_bytes: 2097152
  target_bytes: 1800000
  suffix: "_yt"

openai:
  model: gpt-5.2-2025-12-11
  title_examples_input: |
    Be still and pray; Jesus is near / Real Jesus Teachings [Jerusalem, AD 33] / Be still and pray; Jesus prays for you / Be still; He reaches for you / Be still; He leads you beside quiet waters / Come and breathe; His peace blooms here / Rest easy; He is near / Come and Listen: Jesus Teaching from the Boat [Sea of Galilee, AD 30] / Listen to Jesus Preaching [Jerusalem, AD 33] / Come and rest; Jesus watches over you / When waves rise, Jesus keeps watch / Be still in the storm; Jesus keeps watch / Quiet rest on the road; Jesus watches over you / Be still; the Healer is near / Quiet rest by the fire; Jesus keeps watch / He Suffered for You - Be Still / Listen to the Teachings of Jesus
  devotional_examples_input: |
    The Lord is My Refuge / God, I'm Letting Go - Take Control of My Life / God, I Don't Know the Way - Show Me Where to Go / My Child, Don't Worry - I Will Help You / Lord, Open My Eyes to What I've Been Tolerating and Keep Me from Falling into Sin / God Knows Your Struggles and Stands with You [1 Hour] / Spend Time With God and Find Peace [1Hour] / Quiet Your Heart and Find Peace in Time with God [1Hour] / Take a moment | Rest in God's love [1Hour] / God, I'm Done Trying to Control Everything - Lead Me / Create in Me a Clean Heart, O God - Psalms of Repentance / Lord, order my steps - Because without You I am lost

web:
  host: 127.0.0.1
  port: 5000
  debug: true
