profile:
  id: lofi
  display_name: LoFi Legacy Workflow
  visual_input_mode: image_or_video

paths:
  runtime_root: ../../runtime/lofi
  outputs_dir: ../../runtime/lofi/outputs
  incoming_dir: ../../runtime/lofi/incoming
  images_dir: ../../runtime/lofi/images
  logs_dir: ../../runtime/lofi/logs
  psalms_dir: ../../assets/audio/psalms
  gospel_dir: ../../assets/audio/gospel

workflow:
  fps: 30
  target_duration_tc: "3:33:32:20"
  trim_first_audio_seconds: 3.2
  include_gospel: true
  max_head_items: 3
  max_reference_summaries: 5

thumbnail:
  max_bytes: 2097152
  target_bytes: 1800000
  suffix: "_yt"

openai:
  model: gpt-5.2-2025-12-11
  title_examples_input:
    $include_text: ../local/profiles/lofi/title_examples_input.txt
  devotional_examples_input:
    $include_text: ../local/profiles/lofi/devotional_examples_input.txt
  title_generation:
    count: 10
    min_count: 10
    use_visual_input: true
    require_separator: false
    prompt_addendum:
      $include_text: ../local/profiles/lofi/title_prompt_addendum.txt
    rules:
      - keep them relevant to the current image
      - calm Christian lofi tone
      - no emojis, no hashtags, no all caps
      - keep them natural and concise for YouTube
  theme_generation:
    count: 5
    min_count: 5
    use_visual_input: true
    include_audio_context: false
    prompt_addendum:
      $include_text: ../local/profiles/lofi/theme_prompt_addendum.txt
    rules:
      - 2 to 4 words each
      - aligned with the chosen title
      - aligned with the image
      - calm Christian lofi mood

description:
  variant: vibespro_legacy
  audio_explanation_count: 5

replicate:
  enabled: true
  allow_candidate_generation: true
  candidate_count: 20
  prompt_style: mercy_legacy
  prompt_batch_size: 5
  prompt_parallel_requests: 4
  image_prompt_prefix:
    $include_text: ../local/profiles/lofi/image_prompt_prefix.txt
  prompt_seed_path: ../../assets/prompts/lofi_prompts.local.txt
  image_model: bytedance/seedream-4
  image_payload_style: seedream
  image_output_format: png
  image_size: 2K
  image_width: 2048
  image_height: 2048
  image_max_images: 1
  image_aspect_ratio: "16:9"
  image_enhance_prompt: false
  image_sequential_generation: disabled
  video_model: bytedance/seedance-1.5-pro
  video_fps: 24
  video_duration: 12
  video_resolution: 1080p
  video_aspect_ratio: "16:9"
  video_camera_fixed: true
  video_generate_audio: false
  video_prompt: "Camera locked."
  visual_prompt_generation:
    enabled: true
    system_prompt:
      $include_text: ../local/profiles/lofi/visual_system_prompt.txt
    user_prompt:
      $include_text: ../local/profiles/lofi/visual_user_prompt.txt
    variation_prompt:
      $include_text: ../local/profiles/lofi/visual_variation_prompt.txt
  debug:
    enabled: false
    reuse_candidate_batch: false
    candidate_batch_id: lofi-candidates-20260328-061400
    candidate_batch_strategy: explicit_or_latest
    reuse_render_video: true
    render_video_path: ../../runtime/lofi/incoming/replicate_generated/lofi-candidates-20260328-061400/candidate-04_render.mp4

topaz:
  enabled: true
  api_key_env: TOPAZ_API_KEY
  model: astra
  upscale_factor: 2.0
  poll_interval_seconds: 20
  timeout_seconds: 14400
  output_suffix: _astra
  output_container: mp4
  verify_supported_model: true
  filter_params: {}
  output_overrides:
    audioTransfer: Copy
    audioCodec: AAC
    videoEncoder: H265
    container: mp4

web:
  host: 127.0.0.1
  port: 5003
  debug: true

screen_replace:
  enabled: true
  overlay_video_path: ../../assets/screen_replace/lofi_overlay.local.mp4
  quad_norm: "0.43,0.36;0.74,0.37;0.73,0.61;0.42,0.60"
  target_width: 3840
  target_height: 2160
  target_fps: 30
  output_filename: render_visual_screen_replace.mp4
  overlay_builder:
    enabled: true
    project_dir: ../../screen_overlay
    source_assets_dir: ../../assets/screen_replace/source
    output_video_path: ../../assets/screen_replace/lofi_overlay.local.mp4
    browser_executable_path: /Applications/Chromium.app/Contents/MacOS/Chromium
    props_filename: screen_overlay_props.local.json
    entry_file: src/index.jsx
    composition_id: Overlay4K
    width: 3840
    height: 2160
    fps: 30
    duration_seconds: 12

render:
  enabled: true
  backend: resolve
  timeline_prefix: lofi
  timeline_mode: existing_only
  append_mode: sequential_exact
  clean_media_pool_imports: true
  media_pool_folder_name: YCA Imports
  import_only_required_media: true
  video_mode: image_or_video
  audio_strategy: cut_to_duration
  video_strategy: loop_to_duration
  video_timing_source: metadata_first
  image_strategy: resolve_still_duration
  do_render: false
  render_dir: ../../runtime/lofi/renders
  width: 1920
  height: 1080
