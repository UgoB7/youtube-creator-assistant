profile:
  id: shepherd
  display_name: Mixed Visual Workflow
  visual_input_mode: image_or_video

paths:
  runtime_root: ../../runtime/shepherd
  outputs_dir: ../../runtime/shepherd/outputs
  incoming_dir: ../../runtime/shepherd/incoming
  images_dir: ../../runtime/shepherd/images
  logs_dir: ../../runtime/shepherd/logs
  psalms_dir: ../../assets/audio/psalms
  gospel_dir: ../../assets/audio/gospel

workflow:
  fps: 30
  target_duration_tc: "3:33:32:20"
  trim_first_audio_seconds: 3.2
  include_gospel: true
  max_head_items: 3
  max_reference_summaries: 5

thumbnail:
  max_bytes: 2097152
  target_bytes: 1800000
  suffix: "_yt"

openai:
  model: gpt-5.2-2025-12-11
  title_examples_input: ""
  devotional_examples_input: ""

replicate:
  enabled: true
  prompt_seed_path: ../../assets/prompts/shepherd_prompts.txt
  image_model: bytedance/seedream-4
  image_output_format: png
  image_size: 2K
  image_width: 2048
  image_height: 2048
  image_max_images: 1
  image_aspect_ratio: "16:9"
  image_enhance_prompt: false
  image_sequential_generation: disabled
  video_model: bytedance/seedance-1.5-pro
  video_fps: 24
  video_duration: 12
  video_resolution: 1080p
  video_aspect_ratio: "16:9"
  video_camera_fixed: true
  video_generate_audio: false
  video_prompt: "no camera movement. campfire. no smoke."

web:
  host: 127.0.0.1
  port: 5001
  debug: true

render:
  enabled: true
  backend: resolve
  timeline_prefix: shepherd
  timeline_mode: existing_only
  append_mode: batch
  clean_media_pool_imports: true
  media_pool_folder_name: YCA Imports
  import_only_required_media: true
  video_mode: mixed
  audio_strategy: cut_to_duration
  video_strategy: loop_to_duration
  video_timing_source: metadata_first
  image_strategy: fixed_full_duration
  do_render: false
  render_dir: ../../runtime/shepherd/renders
  width: 1920
  height: 1080
